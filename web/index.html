<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="aggregate · DecL playground — build and explore compound probability distributions via the aggregate API.">
    <title>aggregate · DecL playground</title>

    <link rel="icon"            type="image/x-icon" href="/favicon.ico">
    <link rel="icon"            type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon"            type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon"                                 href="/apple-touch-icon.png">
    <link rel="manifest"                                         href="/site.webmanifest">

    <!-- Bootstrap and our overrides are imported via the JS entry
         point (Vite bundles them through main.js -> styles/site.css).
         No CDN dependency at runtime. -->
</head>
<body class="bg-white">

    <!-- ============================================================
         Navbar
         ============================================================ -->
    <nav class="navbar navbar-expand-lg bg-light border-bottom">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <img src="/logo.png" alt="aggregate" height="34" width="34">
                <span>aggregate <span class="text-muted">· DecL playground</span></span>
            </a>
            <div class="d-flex align-items-center gap-3 ms-auto">
                <span id="version-tag" class="text-muted small font-monospace"></span>
                <a class="link-secondary small" href="https://aggregate.readthedocs.io/" target="_blank" rel="noopener">
                    docs
                </a>
                <a class="link-secondary small" href="https://github.com/mynl/aggregate" target="_blank" rel="noopener">
                    github
                </a>
            </div>
        </div>
    </nav>

    <!-- ============================================================
         Main container
         ============================================================ -->
    <div class="container-fluid px-4 py-3">

        <!-- Header row: dropdowns + build button -->
        <div class="row gx-2 align-items-center mb-3">
            <div class="col-auto">
                <div class="dropdown">
                    <button id="examples-btn"
                            class="btn btn-outline-secondary dropdown-toggle"
                            data-bs-toggle="dropdown"
                            aria-expanded="false">
                        Examples
                    </button>
                    <ul id="examples-menu" class="dropdown-menu" style="max-height: 60vh; overflow-y: auto;">
                        <li><span class="dropdown-item-text text-muted small">loading…</span></li>
                    </ul>
                </div>
            </div>

            <div class="col-auto">
                <div class="dropdown">
                    <button class="btn btn-outline-secondary dropdown-toggle"
                            data-bs-toggle="dropdown"
                            aria-expanded="false">
                        Options
                    </button>
                    <div class="dropdown-menu p-3" style="min-width: 320px;">
                        <div class="mb-2">
                            <label class="form-label small mb-1" for="opt-log2">log2 (grid = 2^log2)</label>
                            <input id="opt-log2" type="number" class="form-control form-control-sm" min="6" max="20">
                        </div>
                        <div class="mb-2">
                            <label class="form-label small mb-1" for="opt-bs">bs (bucket size, 0 = auto)</label>
                            <input id="opt-bs" type="number" step="any" class="form-control form-control-sm" value="0">
                        </div>
                        <div class="form-text small">Leave bs at 0 to let the engine pick.</div>
                    </div>
                </div>
            </div>

            <div class="col-auto ms-auto">
                <button id="build-btn" class="btn btn-primary">
                    Build <span class="text-white-50 small ms-1">Ctrl-Enter</span>
                </button>
            </div>
        </div>

        <!-- Editor row -->
        <div class="row">
            <div class="col-lg-10 offset-lg-1">

                <!-- Editor pane -->
                <div id="editor-host" class="border rounded"></div>

                <!-- Action buttons -->
                <div class="btn-toolbar mt-2 mb-3" role="toolbar" aria-label="Object actions">
                    <div class="btn-group me-2" role="group">
                        <button class="btn btn-outline-primary"   data-action="info">info</button>
                        <button class="btn btn-outline-primary"   data-action="describe">describe</button>
                        <button class="btn btn-outline-primary"   data-action="stats_df">stats_df</button>
                        <button class="btn btn-outline-primary"   data-action="density_df">density_df</button>
                    </div>
                    <div class="btn-group me-2" role="group">
                        <button class="btn btn-outline-primary"   data-action="plot">plot</button>
                        <button class="btn btn-outline-primary"   data-action="cdf">cdf</button>
                        <button class="btn btn-outline-primary"   data-action="qq">qq</button>
                    </div>
                    <div class="btn-group" role="group">
                        <button class="btn btn-outline-secondary dropdown-toggle"
                                data-bs-toggle="dropdown"
                                aria-expanded="false">
                            more
                        </button>
                        <ul class="dropdown-menu">
                            <li><button class="dropdown-item" data-action="kappa">kappa</button></li>
                            <li><button class="dropdown-item" data-action="pricing">pricing at…</button></li>
                        </ul>
                    </div>
                </div>

                <!-- Output region -->
                <div id="output" class="output-pane">
                    <p class="text-muted small">
                        Load an example or type DecL above, press <kbd>Ctrl</kbd>+<kbd>Enter</kbd> to build,
                        then click an action button.
                    </p>
                </div>

            </div>
        </div>
    </div>

    <!-- Vite entry point. main.js imports Bootstrap JS, the editor,
         and wires up the UI. -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
